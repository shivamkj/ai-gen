name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: ai-gen-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: ai-gen-linux-arm64
          - goos: windows
            goarch: amd64
            artifact: ai-gen-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            artifact: ai-gen-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: ai-gen-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build binary
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.artifact }} .

      - name: Compute SHA256
        run: sha256sum backend/${{ matrix.artifact }} > backend/${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            backend/${{ matrix.artifact }}
            backend/${{ matrix.artifact }}.sha256
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums file
        working-directory: dist
        run: |
          cat *.sha256 > checksums-sha256.txt
          echo "=== SHA256 Checksums ===" && cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/ai-gen-linux-amd64
            dist/ai-gen-linux-arm64
            dist/ai-gen-windows-amd64.exe
            dist/ai-gen-darwin-amd64
            dist/ai-gen-darwin-arm64
            dist/checksums-sha256.txt
